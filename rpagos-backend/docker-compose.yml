# ═══════════════════════════════════════════════════════════
#  RPagos — Production Docker Compose
#
#  Services:
#    - api:      FastAPI backend (4 workers)
#    - db:       PostgreSQL 16 (managed data)
#    - redis:    Cache per Alchemy + rate limiting
#    - nginx:    Reverse proxy + SSL + rate limit
#    - prometheus: Metrics collection
#    - grafana:   Dashboard monitoring
# ═══════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── API Backend ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://rpagos:${DB_PASSWORD}@db:5432/rpagos
      - REDIS_URL=redis://redis:6379/0
      - HMAC_SECRET=${HMAC_SECRET}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - DAC8_REPORTING_ENTITY_NAME=${DAC8_ENTITY_NAME:-RPagos S.r.l.}
      - DAC8_REPORTING_ENTITY_TIN=${DAC8_TIN:-IT12345678901}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rpagos-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rpagos
      POSTGRES_USER: rpagos
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpagos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpagos-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpagos-net

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - rpagos-net

  # ── Prometheus (Metrics) ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - rpagos-net

  # ── Grafana (Dashboard) ─────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rpagos-net

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:

networks:
  rpagos-net:
    driver: bridge
