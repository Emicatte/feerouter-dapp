# ═══════════════════════════════════════════════════════════
#  RPagos — Nginx Reverse Proxy
#  Rate limiting, SSL termination, load balancing
# ═══════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ── Basic ─────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Rate Limiting Zones ───────────────────────────────
    # 10 req/sec per IP per le API normali
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # 2 req/sec per IP per il callback (anti-replay)
    limit_req_zone $binary_remote_addr zone=callback:10m rate=2r/s;
    # 1 req/sec per IP per la generazione report
    limit_req_zone $binary_remote_addr zone=report:10m rate=1r/s;

    # ── Upstream (load balanced API) ──────────────────────
    upstream rpagos_api {
        least_conn;
        server api:8000;
        # Con Docker replicas, ogni container è raggiungibile
    }

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ───────────────────────────────────────────
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name api.rpagos.io;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.rpagos.io;

        # SSL (sostituisci con i tuoi certificati Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        # ── Health check (no rate limit) ──────────────────
        location /health {
            proxy_pass http://rpagos_api;
            proxy_set_header Host $host;
        }

        # ── Swagger docs (rate limited) ───────────────────
        location /docs {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://rpagos_api;
            proxy_set_header Host $host;
        }

        # ── TX Callback (strict rate limit) ───────────────
        location /api/v1/tx/callback {
            limit_req zone=callback burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://rpagos_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── DAC8 Report (very strict) ─────────────────────
        location /api/v1/dac8/ {
            limit_req zone=report burst=2 nodelay;

            proxy_pass http://rpagos_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── All other API routes ──────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://rpagos_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ── Custom 429 response ───────────────────────────
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"RATE_LIMITED","message":"Troppe richieste. Riprova tra qualche secondo."}';
        }
    }
}
