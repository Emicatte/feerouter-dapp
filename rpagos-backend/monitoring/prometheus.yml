global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alertmanager ──────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Alert Rules ───────────────────────────────────────────
rule_files:
  - /etc/prometheus/alertmanager_rules.yml

# ── Scrape Configs ────────────────────────────────────────
scrape_configs:
  - job_name: 'rpagos-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 10s

  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery-exporter:9808']
    scrape_interval: 15s
