<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Verify your rsend account</title></head>
<body style="font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #2C2C2A;">
  <h1 style="color: #C8512C;">Welcome to rsend, {{display_name}}</h1>
  <p>Thanks for signing up. Please verify your email to activate your account.</p>
  <p style="margin: 32px 0;">
    <a href="{{verify_url}}" style="background: #C8512C; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block;">Verify email</a>
  </p>
  <p style="color: #888780; font-size: 14px;">Or copy this link: {{verify_url}}</p>
  <p style="color: #888780; font-size: 14px;">This link expires in {{expires_hours}} hours. If you didn't sign up, you can ignore this email.</p>
  <hr style="border: none; border-top: 1px solid #eee; margin: 32px 0;">
  <p style="color: #888780; font-size: 12px;">rsend &mdash; Web3 payment infrastructure</p>
</body>
</html>
